<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <button onclick="hienThi()"> Hiển thị thời gian </button>
  <p id="ketqua"></p>
  <hr>
  <button onclick="demClick()">Đếm số lần bấm</button>
  <p id="ketqua2"></p>
  <hr>
  <button onclick="tangSize()">Tăng cỡ chữ</button>
  <button onclick="giamSize()">Giảm cỡ chữ</button>
  <p id="ketqua3">Trường Cao đẳng Bách khoa Việt Nam 2025 - 2026</p>

  <script>
    let coChu = 16;
    function tangSize(){
      coChu = coChu + 2;
      document.getElementById('ketqua3').style.fontSize = coChu+'px';
    }
    function giamSize(){
      coChu = coChu - 2;
      document.getElementById('ketqua3').style.fontSize = coChu+'px';
    }

    function hienThi(){
      let d = new Date();
      let timeString = d.toLocaleString();
      document.getElementById('ketqua').innerHTML = timeString;
    }

    let dem = 0;
    function demClick(){
      dem++;
      document.getElementById('ketqua2').innerHTML = "Bạn đã bấm nút " + dem + " lần!";
    }
  </script>
</body>
</html>
