<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <button onclick="hienThi()"> Hiển thị thời gian </button>

  <p id="ketqua"></p>

  <script>
    function hienThi(){
      let d = new Date();
      let timeString = d.toLocaleString();
      document.getElementById('ketqua').innerHTML = timeString;
    }
  </script>
</body>
</html>
